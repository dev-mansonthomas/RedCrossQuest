; enable the gRPC extension
extension=grpc.so
; enable protobuf
extension="protobuf.so"

; Workaround for PHP 8.3+ stack size check incorrectly tripping when the gRPC C
; extension invokes PHP credential callbacks from its internal worker thread.
; Without this, SecretManager/any gRPC Google Cloud client crashes on GAE php85 with:
;   "Maximum call stack size of 8339456 bytes ... reached. Infinite recursion?"
;   in vendor/google/gax/src/CredentialsWrapper.php
; See: grpc/grpc#41523, grpc/grpc#39509, googleapis/gax-php#584
zend.max_allowed_stack_size=-1
