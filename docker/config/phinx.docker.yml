paths:
    migrations: "%%PHINX_CONFIG_DIR%%/db/migrations"
    seeds:      "%%PHINX_CONFIG_DIR%%/db/seeds"

environments:
    default_migration_table: phinxlog
    default_environment: docker

    docker:
        adapter: mysql
        host:    mariadb
        name:    rcq
        user:    root
        pass:    '%%MYSQL_ROOT_PASSWORD%%'
        port:    3306
        charset: utf8mb4
