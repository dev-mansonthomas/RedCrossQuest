; RedCrossQuest - overrides applied on top of php:8.5-fpm defaults
; Matches the values from the macOS install guide & server/php.ini

date.timezone = Europe/Paris
memory_limit = 512M
post_max_size = 32M
upload_max_filesize = 32M
max_execution_time = 60

; Opcache - GAE-like production settings
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 192
opcache.max_accelerated_files = 20000
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; Display errors only in the dev container (docker-compose overrides via env)
display_errors = ${PHP_DISPLAY_ERRORS}
log_errors = 1
error_log = /proc/self/fd/2
