; PHP-FPM pool - aligned with GAE `php83` defaults
[www]
user = www-data
group = www-data

listen = 0.0.0.0:9000
listen.backlog = 128

pm = dynamic
pm.max_children = 20
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 4
pm.max_requests = 500

; Ship logs to container stdout/stderr so `docker compose logs` works out of the box
access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no

clear_env = no
