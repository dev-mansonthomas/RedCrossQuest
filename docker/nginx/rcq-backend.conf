# RedCrossQuest backend vhost - mirrors GAE php85 routing
# Entry point:  server/public/rest/index.php  (base path /rest)
# See: server/public/rest/index.php:67  -> $app->setBasePath('/rest');

server {
    listen       8080 default_server;
    server_name  _;

    root  /app/server/public;
    index index.php;

    # Kubernetes / docker-compose healthcheck
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # All REST calls live under /rest and are handled by Slim's front controller
    location /rest {
        try_files $uri $uri/ /rest/index.php?$query_string;
    }

    # Root: not used (front is served by the node-client container in dev,
    # and by the `front` GAE service in prod). Return a minimal stub.
    location = / {
        return 200 "RCQ API container (use http://localhost:3000 for the front-end)\n";
        add_header Content-Type text/plain;
    }

    # PHP-FPM pass-through
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass   php-fpm:9000;
        fastcgi_index  index.php;

        include        fastcgi_params;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param  PATH_INFO        $fastcgi_path_info;

        # Mirror GAE security headers
        fastcgi_hide_header X-Powered-By;
        add_header X-Frame-Options     DENY    always;
        add_header X-Content-Type-Options nosniff always;

        fastcgi_read_timeout 60s;
    }

    # Deny access to hidden files and vendor / src
    location ~ /\.(?!well-known).* { deny all; }
    location ~ ^/(vendor|src|db)/  { deny all; }
}
