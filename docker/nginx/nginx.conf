user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # GAE-like access log format (JSON) -> easier to parse with Cloud Logging later
    log_format  rcq_json escape=json
        '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
        '"uri":"$request_uri","status":$status,"bytes":$body_bytes_sent,'
        '"referer":"$http_referer","ua":"$http_user_agent","rt":$request_time}';

    access_log  /var/log/nginx/access.log  rcq_json;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout  65;

    gzip  on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    client_max_body_size 32m;

    include /etc/nginx/conf.d/*.conf;
}
